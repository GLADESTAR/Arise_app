name: arise_app
description: "Arise - Gamified self-improvement RPG app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  hive_flutter: ^1.1.0

  # Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    